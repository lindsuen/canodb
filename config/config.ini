# ------------------------------------------------------------
#                The CanoDB configuration file.
# ------------------------------------------------------------
[connection]
listen_address = 0.0.0.0
port = 4644

[ssl]
ssl = off
ssl_ca_file =
ssl_cert_file = server.crt
ssl_key_file = server.key
ssl_ciphers = HIGH:MEDIUM:+3DES:!aNULL

[data]
data_directory = data
